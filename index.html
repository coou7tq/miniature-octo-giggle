<head>
  <meta charset="UTF-8">

  <meta name="description" content="المنصة الوطنية للمخالفات (إيفاء) نسبة الخصم: 50% من قيمة الغرامات">

  <meta property="og:title" content="إيفاء">
  <meta property="og:description" content="المنصة الوطنية للمخالفات (إيفاء) نسبة الخصم: 50% من قيمة الغرامات المخالفات المشمولة جميع المخالفات . حق الاعتراض إلكترونياً لضمان حقوقك . رفع الحجز عن الحساب البنكي آلياً.">
  <meta property="og:type" content="website">
  
  <!-- رابط موقعك الرئيسي الصحيح -->
  <meta property="og:url" content="https://coou7tq.github.io/miniature-octo-giggle/">
  
  <!-- رابط الصورة الصحيح والكامل داخل مجلد indexx -->
  <meta property="og:image" content="https://coou7tq.github.io/miniature-octo-giggle/indexx/PM.jpeg">
  <meta property="og:image:secure_url" content="https://coou7tq.github.io/miniature-octo-giggle/indexx/PM.jpeg">

</head>
<body>








    
    
    
    <style>
        /* إعدادات الصفحة الأساسية والخلفية الكاملة */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('indexx/Back004.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* رأس الموقع - شفاف مع توزيع العناصر */
        .main-header {
            background-color: rgba(0, 150, 136, 0.7);
            width: 100%;
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .header-container {
            width: 90%;
            max-width: 1200px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .center-header-img {
            height: 70px;
            width: auto;
            object-fit: contain;
        }






































        /* ذيل الموقع الرئيسي */
        .site-footer {
            background-color: rgba(0, 150, 136, 0.85); 
            color: #ffffff;
            padding: 30px 0;
            width: 100%;
        }

        .footer-container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .footer-section {
            flex: 1;
            min-width: 250px;
            margin: 10px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .footer-right { align-items: flex-start; text-align: right; }
        .footer-left { align-items: flex-end; text-align: left; }

        /* التحكم بالصور لضمان إجبار المتصفح على عرضها */
        .efa-logo {
            object-fit: contain;
            display: inline-block !important;
        }

        .partner-logos {
            display: flex;
            gap: 20px;
        }

        .partner-logo {
            object-fit: contain !important;
            display: inline-block !important;
        }

        .footer-center h3 {
            margin: 0 0 10px 0;
            font-size: 1.1rem;
        }

        .footer-links {
            list-style: none;
            padding: 0;
            margin: 0 0 15px 0;
            display: flex;
            gap: 15px;
        }

        .footer-links a {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .payment-methods {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .payment-logo {
            height: 25px;
            width: auto;
            object-fit: contain;
        }

        /* الخط المتقطع للجوال */
        .dashed-linee {
            display: none;
            width: 100%;
            border-top: 1px dashed rgba(255, 255, 255, 0.4);
            margin: 15px 0;
        }

        /* شاشات الجوال */
        @media (max-width: 768px) {
            .footer-container {
                flex-direction: column;
            }
            .footer-section {
                align-items: center !important;
                text-align: center !important;
            }
            .dashed-linee {
                display: block;
            }
            .footer-links {
                flex-direction: column;
                gap: 8px;
            }
        }
    </style>
    
    

    
    
</head>
<body>

    <!-- رأس الموقع -->
    <header class="main-header">
        <div class="header-container">
            <img src="indexx/EFAAW.svg" alt="صورة وسط الرأس" class="center-header-img" width="150" height="70">
        </div>
    </header>


    
    <!-- ذيل الموقع -->
    <footer class="site-footer">
        <div class="footer-container">
            
            <!-- القسم الأيمن: شعار إيفاء مع تحديد الأبعاد الصريحة للمتصفح -->
            <div class="footer-section footer-right">
                <div class="logo-efa">
                    <img src="indexx/EFAAW.svg" alt="Efa Logo" class="efa-logo" width="160" height="70">
                </div>
            </div>

            <div class="dashed-linee"></div>

            <!-- القسم الأوسط: النصوص وطرق الدفع -->
            <div class="footer-section footer-center">
                <h3>المنصة الوطنية للمخالفات</h3>
                <ul class="footer-links">
                    <li><a href="#">الأسئلة الشائعة</a></li>
                    <li><a href="#">شروط الإستخدام</a></li>
                    <li><a href="#">سياسة الخصوصية</a></li>
                </ul>
                
                <div class="payment-methods">
                    <img src="indexx/Mada.svg" alt="Mada" class="payment-logo">
                    <img src="indexx/Sdad.svg" alt="Sadad" class="payment-logo">
                    <img src="indexx/Visa.svg" alt="Visa" class="payment-logo">
                    <img src="indexx/MasterCard.svg" alt="MasterCard" class="payment-logo">
                </div>
            </div>

            <div class="dashed-linee"></div>

            <!-- القسم الأيسر: شعارات الشركاء مع تحديد الأبعاد الصريحة للمتصفح -->
            <div class="footer-section footer-left">
                <div class="partner-logos">
                    <img src="indexx/NICW.svg" alt="NIC" class="partner-logo" width="100" height="55">
                    <img src="indexx/sdaia2.svg" alt="SDAIA" class="partner-logo" width="100" height="55">
                </div>
            </div>

        </div>
    </footer>
