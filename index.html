<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رأس موقع بخلفية شفافة وصورة في الوسط</title>
    
    <style>
        /* تصنيفات عامة وتجهيز خلفية الصفحة لرؤية الشفافية */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            /* وضعنا خلفية ملونة أو صورة هنا لتلاحظ أن الرأس شفاف تماماً ويظهر ما تحته */
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
        }

        /* تنسيق الرأس الشفاف */
        .transparent-header {
            position: fixed; /* يجعله طافياً أعلى الصفحة */
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.05); /* خلفية شفافة جداً */
            backdrop-filter: blur(10px); /* تأثير زجاجي ضبابي عصري */
            -webkit-backdrop-filter: blur(10px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between; /* توزيع العناصر بالتساوي */
            align-items: center; /* محاذاة عمودية في المنتصف */
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); /* خط سفلي ناعم */
            z-index: 1000;
        }

        /* القوائم الجانبية (يمين ويسار الشعار) */
        .nav-links {
            display: flex;
            list-style: none;
            gap: 25px;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: color 0.3s, transform 0.2s;
        }

        .nav-links a:hover {
            color: #00d2ff; /* يتغير اللون عند تمرير الماوس */
        }

        /* حاوية الصورة في الوسط تماماً */
        .logo-container {
            position: absolute;
            left: 50%;
            transform: translateX(-50%); /* يضمن توسيط الصورة بدقة 100% */
        }

        .logo-image {
            height: 60px; /* يمكنك التحكم في حجم الصورة من هنا */
            width: auto;
            display: block;
            object-fit: contain;
        }

        /* مساحة تجريبية فقط لتعويض مكان الرأس المثبت */
        .hero-section {
            padding-top: 150px;
            text-align: center;
            color: white;
        }
    </style>
</head>
<body>

    <!-- رأس الموقع الشفاف -->
    <header class="transparent-header">
        
        <!-- القائمة اليمنى -->
        <ul class="nav-links">
            <li><a href="#">الرئيسية</a></li>
            <li><a href="#">خدماتنا</a></li>
        </ul>

        <!-- الصورة في المنتصف تماماً -->
        <div class="logo-container">
            <!-- استبدل رابط الصورة برابط لوجو موقعك الخاص -->
            <img src="https://placeholder.com" alt="شعار الموقع" class="logo-image">
        </div>

        <!-- القائمة اليسرى -->
        <ul class="nav-links">
            <li><a href="#">من نحن</a></li>
            <li><a href="#">اتصل بنا</a></li>
        </ul>

    </header>

    <!-- محتوى تجريبي خلف الرأس الشفاف -->
    <section class="hero-section">
        <h1>أهلاً بك في موقعنا</h1>
        <p>لاحظ كيف يظهر محتوى الصفحة والخلفية من تحت رأس الموقع الشفاف.</p>
    </section>

</body>
</html>
